<style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0e1a; /* Explicit dark background */

        ::-webkit-scrollbar {
            width: 6px;
        }

        }
        ::-webkit-scrollbar-thumb {
            background: rgba(125, 211, 252, 0.2);

<body class="bg-background text-on-background min-h-screen flex flex-col antialiased relative overflow-hidden">
<!-- Decorative Glow Elements -->
<div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-tertiary/10 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md mx-auto relative z-10 flex flex-col h-screen">
<!-- Top Navigation (Task-Focused - No Global Shell) -->
<header class="w-full flex items-center justify-between px-6 py-6 border-b border-primary/10 bg-background/80 backdrop-blur-xl z-20 sticky top-0">
<button class="w-10 h-10 rounded-full bg-surface-container/60 flex items-center justify-center border border-primary/10 hover:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-on-surface">arrow_back</span>
</button>
<h1 class="text-xl font-headline font-semibold tracking-tight text-on-surface">Categorías</h1>
<div class="w-10 h-10"></div> <!-- Placeholder for balance -->
</header>

<div class="flex-1 overflow-y-auto px-6 py-8 space-y-6">
<div class="space-y-2">
<p class="text-xs font-label font-medium text-primary tracking-wider uppercase">Selecciona los servicios</p>
<h2 class="text-2xl font-headline font-bold text-on-surface leading-tight">¿Qué necesitas<br/>para tu proyecto?</h2>
</div>
<!-- Categories Grid/List -->
<div class="grid grid-cols-1 gap-4">
<!-- Category Item 1 (Selected) -->
<button class="w-full relative overflow-hidden rounded-xl bg-surface-container/60 backdrop-blur-2xl border border-primary/30 p-4 flex items-center gap-4 transition-all hover:bg-surface-container-high/80 group">
<div class="w-12 h-12 rounded-lg bg-primary/20 flex items-center justify-center border border-primary/20 shrink-0">
<span class="material-symbols-outlined text-primary text-2xl" style="font-variation-settings: 'FILL' 1;">hardware</span>
</div>
<div class="flex-1 text-left">
<h3 class="text-base font-headline font-semibold text-on-surface">Demolición</h3>
<p class="text-sm font-body text-on-surface-variant">Derribos y limpieza</p>
</div>
<div class="w-6 h-6 rounded-full bg-primary flex items-center justify-center shadow-[0_0_15px_rgba(125,211,252,0.4)] shrink-0">
<span class="material-symbols-outlined text-on-primary text-sm font-bold">check</span>
</div>
</button>
<!-- Category Item 2 (Unselected) -->
<button class="w-full relative overflow-hidden rounded-xl bg-surface-container/40 backdrop-blur-xl border border-primary/10 p-4 flex items-center gap-4 transition-all hover:bg-surface-container/80 hover:border-primary/20 group">
<div class="w-12 h-12 rounded-lg bg-surface-container-high flex items-center justify-center border border-white/5 shrink-0 transition-colors group-hover:bg-primary/10">
<span class="material-symbols-outlined text-on-surface-variant text-2xl group-hover:text-primary transition-colors">water_drop</span>
</div>
<div class="flex-1 text-left">
<h3 class="text-base font-headline font-semibold text-on-surface">Fontanería</h3>
<p class="text-sm font-body text-on-surface-variant">Tuberías y sanitarios</p>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center shrink-0 group-hover:border-primary/50 transition-colors">
</div>
</button>

</div>

<h3 class="text-base font-headline font-semibold text-on-surface">Pladur</h3>
<p class="text-sm font-body text-on-surface-variant">Techos y tabiques</p>
</div>
<div class="w-6 h-6 rounded-full bg-primary flex items-center justify-center shadow-[0_0_15px_rgba(125,211,252,0.4)] shrink-0">

</button>

</div>
<div class="w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center shrink-0 group-hover:border-primary/50 transition-colors">
</div>
</button>

<div class="w-12 h-12 rounded-lg bg-surface-container-high flex items-center justify-center border border-white/5 shrink-0 transition-colors group-hover:bg-primary/10">
<span class="material-symbols-outlined text-on-surface-variant text-2xl group-hover:text-primary transition-colors">format_paint</span>
</div>
<div class="flex-1 text-left">
<h3 class="text-base font-headline font-semibold text-on-surface">Pintura</h3>
<p class="text-sm font-body text-on-surface-variant">Interiores y exteriores</p>

<div class="w-6 h-6 rounded-full border-2 border-outline flex items-center justify-center shrink-0 group-hover:border-primary/50 transition-colors">
</div>
</button>

</button>
